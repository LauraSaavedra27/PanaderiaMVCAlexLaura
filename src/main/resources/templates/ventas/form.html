<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Venta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Nueva Venta</h2>

<form th:action="@{/ventas/guardar}" th:object="${venta}" method="post">

    <div class="mb-3">
        <label>Cliente</label>
        <select th:field="*{cliente.id}" class="form-control">
            <option th:each="c : ${clientes}"
                    th:value="${c.id}"
                    th:text="${c.nombre}">
            </option>
        </select>
    </div>

    <h5>Productos</h5>

    <table class="table table-bordered" id="tablaDetalles">
        <thead>
        <tr>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Subtotal</th>
            <th></th>
        </tr>
        </thead>
        <tbody id="filas">
        <tr th:each="detalle, idx : *{detalles}" th:id="'fila-' + ${idx.index}">
            <td>
                <select th:name="'detalles[' + ${idx.index} + '].producto.id'"
                        class="form-control producto-select"
                        onchange="calcularSubtotal(this)">
                    <option th:each="p : ${productos}"
                            th:value="${p.id}"
                            th:text="${p.nombre + ' ($' + p.precio + ')'}"
                            th:attr="data-precio=${p.precio}">
                    </option>
                </select>
            </td>
            <td>
                <input type="number"
                       th:name="'detalles[' + ${idx.index} + '].cantidad'"
                       class="form-control cantidad-input"
                       value="1" min="1"
                       onchange="calcularSubtotal(this)">
            </td>
            <td>
                <input type="text" class="form-control subtotal-input" readonly value="0">
            </td>
            <td>
                <button type="button" class="btn btn-danger btn-sm"
                        onclick="eliminarFila(this)">✕</button>
            </td>
        </tr>
        </tbody>
    </table>

    <button type="button" class="btn btn-secondary mb-3" onclick="agregarFila()">
        + Agregar producto
    </button>

    <div class="mb-3">
        <strong>Total: $<span id="totalGeneral">0</span></strong>
    </div>

    <button type="submit" class="btn btn-success">Guardar venta</button>
    <a href="/ventas" class="btn btn-secondary">Cancelar</a>

</form>

<script>
    // Lista de productos con precios para JavaScript
    const productos = [
        /*[[${productos}]]*/ []
    ].map ? /*[[ ${productos} ]]*/ null : null;

    const preciosMap = {};
    document.querySelectorAll('.producto-select option').forEach(opt => {
        preciosMap[opt.value] = parseFloat(opt.getAttribute('data-precio')) || 0;
    });

    let filaIndex = document.querySelectorAll('#filas tr').length;

    function agregarFila() {
        const tbody = document.getElementById('filas');
        const primerSelect = document.querySelector('.producto-select');
        const opcionesHTML = primerSelect ? primerSelect.innerHTML : '';

        const tr = document.createElement('tr');
        tr.id = 'fila-' + filaIndex;
        tr.innerHTML = `
            <td>
                <select name="detalles[${filaIndex}].producto.id"
                        class="form-control producto-select"
                        onchange="calcularSubtotal(this)">
                    ${opcionesHTML}
                </select>
            </td>
            <td>
                <input type="number"
                       name="detalles[${filaIndex}].cantidad"
                       class="form-control cantidad-input"
                       value="1" min="1"
                       onchange="calcularSubtotal(this)">
            </td>
            <td>
                <input type="text" class="form-control subtotal-input" readonly value="0">
            </td>
            <td>
                <button type="button" class="btn btn-danger btn-sm"
                        onclick="eliminarFila(this)">✕</button>
            </td>
        `;
        tbody.appendChild(tr);
        filaIndex++;
        calcularTotal();
    }

    function eliminarFila(btn) {
        const fila = btn.closest('tr');
        fila.remove();
        calcularTotal();
    }

    function calcularSubtotal(el) {
        const fila = el.closest('tr');
        const select = fila.querySelector('.producto-select');
        const cantidad = parseFloat(fila.querySelector('.cantidad-input').value) || 0;
        const precio = preciosMap[select.value] || 0;
        const subtotal = precio * cantidad;
        fila.querySelector('.subtotal-input').value = subtotal.toFixed(2);
        calcularTotal();
    }

    function calcularTotal() {
        let total = 0;
        document.querySelectorAll('.subtotal-input').forEach(input => {
            total += parseFloat(input.value) || 0;
        });
        document.getElementById('totalGeneral').textContent = total.toFixed(2);
    }

    // Calcular subtotales iniciales al cargar
    document.querySelectorAll('.producto-select').forEach(sel => calcularSubtotal(sel));
</script>

</body>
</html>
