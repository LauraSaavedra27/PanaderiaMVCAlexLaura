<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Nueva Venta')}"></head>

<body>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">

    <h2><i class="bi bi-cart-plus"></i> Nueva Venta</h2>

    <div class="card" style="max-width: 800px;">
        <div class="card-body p-4">

            <form th:action="@{/ventas/guardar}" th:object="${venta}" method="post">

                <div class="mb-4">
                    <label><i class="bi bi-person"></i> Cliente</label>
                    <select th:field="*{cliente.id}" class="form-control">
                        <option th:each="c : ${clientes}"
                                th:value="${c.id}"
                                th:text="${c.nombre}">
                        </option>
                    </select>
                </div>

                <!-- ✅ NUEVO: selector de estado -->
                <div class="mb-4">
                    <label><i class="bi bi-flag"></i> Estado de la venta</label>
                    <select th:field="*{estado}" class="form-control">
                        <option th:each="e : ${estados}"
                                th:value="${e}"
                                th:text="${e}">
                        </option>
                    </select>
                </div>

                <h5 class="mb-3"><i class="bi bi-box-seam"></i> Productos</h5>

                <table class="table table-bordered" id="tablaDetalles">
                    <thead class="table-dark">
                    <tr>
                        <th>Producto</th>
                        <th>Cantidad</th>
                        <th>Subtotal</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody id="filas">
                    <tr th:each="detalle, idx : *{detalles}" th:id="'fila-' + ${idx.index}">
                        <td>
                            <select th:name="'detalles[' + ${idx.index} + '].producto.id'"
                                    class="form-control producto-select"
                                    onchange="calcularSubtotal(this)">
                                <option th:each="p : ${productos}"
                                        th:value="${p.id}"
                                        th:text="${p.nombre + ' ($' + p.precio + ')'}"
                                        th:attr="data-precio=${p.precio}">
                                </option>
                            </select>
                        </td>
                        <td>
                            <input type="number"
                                   th:name="'detalles[' + ${idx.index} + '].cantidad'"
                                   class="form-control cantidad-input"
                                   value="1" min="1"
                                   onchange="calcularSubtotal(this)">
                        </td>
                        <td>
                            <input type="text" class="form-control subtotal-input" readonly value="0">
                        </td>
                        <td>
                            <button type="button" class="btn btn-danger btn-sm"
                                    onclick="eliminarFila(this)">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                    </tbody>
                </table>

                <button type="button" class="btn btn-secondary mb-4" onclick="agregarFila()">
                    <i class="bi bi-plus-circle"></i> Agregar producto
                </button>

                <div class="card mb-4" style="max-width: 300px; background-color: #EFEBE9;">
                    <div class="card-body">
                        <h5>💰 Total: $<span id="totalGeneral">0</span></h5>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-check-circle"></i> Guardar venta
                    </button>
                    <a href="/ventas" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Cancelar
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>

<script>
    const preciosMap = {};
    document.querySelectorAll('.producto-select option').forEach(opt => {
        preciosMap[opt.value] = parseFloat(opt.getAttribute('data-precio')) || 0;
    });

    let filaIndex = document.querySelectorAll('#filas tr').length;

    function agregarFila() {
        const tbody = document.getElementById('filas');
        const primerSelect = document.querySelector('.producto-select');
        const opcionesHTML = primerSelect ? primerSelect.innerHTML : '';

        const tr = document.createElement('tr');
        tr.id = 'fila-' + filaIndex;
        tr.innerHTML = `
            <td>
                <select name="detalles[${filaIndex}].producto.id"
                        class="form-control producto-select"
                        onchange="calcularSubtotal(this)">
                    ${opcionesHTML}
                </select>
            </td>
            <td>
                <input type="number"
                       name="detalles[${filaIndex}].cantidad"
                       class="form-control cantidad-input"
                       value="1" min="1"
                       onchange="calcularSubtotal(this)">
            </td>
            <td>
                <input type="text" class="form-control subtotal-input" readonly value="0">
            </td>
            <td>
                <button type="button" class="btn btn-danger btn-sm"
                        onclick="eliminarFila(this)">
                    <i class="bi bi-trash"></i>
                </button>
            </td>
        `;
        tbody.appendChild(tr);
        filaIndex++;
        calcularTotal();
    }

    function eliminarFila(btn) {
        btn.closest('tr').remove();
        calcularTotal();
    }

    function calcularSubtotal(el) {
        const fila = el.closest('tr');
        const select = fila.querySelector('.producto-select');
        const cantidad = parseFloat(fila.querySelector('.cantidad-input').value) || 0;
        const precio = preciosMap[select.value] || 0;
        fila.querySelector('.subtotal-input').value = (precio * cantidad).toFixed(2);
        calcularTotal();
    }

    function calcularTotal() {
        let total = 0;
        document.querySelectorAll('.subtotal-input').forEach(input => {
            total += parseFloat(input.value) || 0;
        });
        document.getElementById('totalGeneral').textContent = total.toFixed(2);
    }

    document.querySelectorAll('.producto-select').forEach(sel => calcularSubtotal(sel));
</script>

</body>
</html>
