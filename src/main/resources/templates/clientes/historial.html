<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Historial Cliente</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2 th:text="${cliente.nombre}"></h2>

<a href="/clientes" class="btn btn-secondary mb-3">Volver</a>

<table class="table table-bordered">

    <thead>
    <tr>
        <th>ID</th>
        <th>Producto</th>
        <th>Cantidad</th>
        <th>Total</th>
        <th>Fecha</th>
    </tr>
    </thead>

    <tbody>

    <tr th:if="${ventas == null || #lists.isEmpty(ventas)}">
        <td colspan="5" class="text-center">No hay compras registradas</td>
    </tr>

    <tr th:each="v : ${ventas}">
        <td th:text="${v.id}"></td>
        <td th:text="${v.producto != null ? v.producto.nombre : 'N/A'}"></td>
        <td th:text="${v.cantidad}"></td>
        <td th:text="${v.total}"></td>
        <td th:text="${v.fecha}"></td>
    </tr>

    </tbody>

</table>

<h4>Total general: <span th:text="${totalGeneral}"></span></h4>

</body>
</html>
