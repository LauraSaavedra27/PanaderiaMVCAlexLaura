<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Formulario Cliente')}"></head>

<body>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">

    <h2><i class="bi bi-person-plus"></i> Cliente</h2>

    <div class="card" style="max-width: 600px;">
        <div class="card-body p-4">

            <form th:action="@{/clientes/guardar}" th:object="${cliente}" method="post">

                <input type="hidden" th:field="*{id}"/>

                <div class="mb-3">
                    <label><i class="bi bi-person"></i> Nombre</label>
                    <input type="text" class="form-control" th:field="*{nombre}" required>
                </div>

                <div class="mb-3">
                    <label><i class="bi bi-card-id"></i> Documento de identidad</label>
                    <input type="text" class="form-control" th:field="*{documento}" required
                           placeholder="Ej: 1234567890">
                </div>

                <div class="mb-3">
                    <label><i class="bi bi-telephone"></i> Teléfono</label>
                    <input type="text" class="form-control" th:field="*{telefono}">
                </div>

                <div class="mb-3">
                    <label><i class="bi bi-envelope"></i> Email</label>
                    <input type="email" class="form-control" th:field="*{email}">
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-check-circle"></i> Guardar
                    </button>
                    <a class="btn btn-secondary" th:href="@{/clientes}">
                        <i class="bi bi-arrow-left"></i> Volver
                    </a>
                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>
