<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Clientes')}"></head>

<body>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">

    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

    <h2><i class="bi bi-people-fill"></i> Clientes</h2>

    <div class="mb-3">
        <a class="btn btn-primary" th:href="@{/clientes/nuevo}">
            <i class="bi bi-person-plus"></i> Nuevo Cliente
        </a>
    </div>

    <table class="table table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Documento</th>
            <th>Teléfono</th>
            <th>Email</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${clientes}">
            <td th:text="${c.id}"></td>
            <td th:text="${c.nombre}"></td>
            <td th:text="${c.documento}"></td>
            <td th:text="${c.telefono}"></td>
            <td th:text="${c.email}"></td>
            <td>
                <a class="btn btn-warning btn-sm"
                   th:href="@{'/clientes/editar/' + ${c.id}}">
                    <i class="bi bi-pencil"></i> Editar
                </a>
                <a class="btn btn-info btn-sm"
                   th:href="@{'/clientes/' + ${c.id} + '/historial'}">
                    <i class="bi bi-clock-history"></i> Historial
                </a>
                <a class="btn btn-danger btn-sm"
                   th:href="@{'/clientes/eliminar/' + ${c.id}}">
                    <i class="bi bi-trash"></i> Eliminar
                </a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
