<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Nuevo Usuario')}"></head>

<body>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">

    <h2><i class="bi bi-person-plus"></i> Nuevo Usuario</h2>

    <div class="card" style="max-width: 600px;">
        <div class="card-body p-4">

            <form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post">

                <input type="hidden" th:field="*{id}"/>

                <div class="mb-3">
                    <label><i class="bi bi-person"></i> Nombre de usuario</label>
                    <input type="text" class="form-control" th:field="*{username}" required>
                </div>

                <div class="mb-3">
                    <label><i class="bi bi-lock"></i> Contraseña</label>
                    <input type="password" class="form-control" th:field="*{password}" required>
                </div>

                <div class="mb-3">
                    <label><i class="bi bi-shield"></i> Rol</label>
                    <select class="form-control" th:field="*{rol}">
                        <option value="ROLE_ADMIN">Administrador</option>
                        <option value="ROLE_USER">Usuario</option>
                    </select>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-check-circle"></i> Guardar
                    </button>
                    <a class="btn btn-secondary" th:href="@{/usuarios}">
                        <i class="bi bi-arrow-left"></i> Volver
                    </a>
                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>
