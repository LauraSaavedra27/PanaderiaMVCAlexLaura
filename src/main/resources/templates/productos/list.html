<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Productos')}"></head>

<body>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">

    <h2><i class="bi bi-box-seam-fill"></i> Productos</h2>

    <div class="d-flex gap-2 mb-3">
        <a class="btn btn-primary" th:href="@{/productos/nuevo}">
            <i class="bi bi-plus-circle"></i> Nuevo Producto
        </a>
    </div>

    <form class="mb-3 d-flex gap-2" th:action="@{/productos/buscar}" method="get">
        <input type="text" name="nombre" class="form-control"
               placeholder="Buscar producto..." style="max-width: 300px;">
        <button class="btn btn-secondary">
            <i class="bi bi-search"></i> Buscar
        </button>
    </form>

    <table class="table table-hover">
        <thead class="table-dark">
        <tr>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Categoría</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${productos}">
            <td th:text="${p.nombre}"></td>
            <td th:text="${'$' + p.precio}"></td>
            <td>
                <span th:text="${p.stock}"
                      th:class="${p.stock <= 5 ? 'badge bg-danger' : 'badge bg-success'}">
                </span>
            </td>
            <td th:text="${p.categoria.nombre}"></td>
            <td>
                <a class="btn btn-warning btn-sm"
                   th:href="@{'/productos/editar/' + ${p.id}}">
                    <i class="bi bi-pencil"></i> Editar
                </a>
                <a class="btn btn-danger btn-sm"
                   th:href="@{'/productos/eliminar/' + ${p.id}}">
                    <i class="bi bi-trash"></i> Eliminar
                </a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
