<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Usuarios')}"></head>

<body>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">

    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

    <h2><i class="bi bi-person-lock"></i> Usuarios</h2>

    <div class="mb-3">
        <a class="btn btn-primary" th:href="@{/usuarios/nuevo}">
            <i class="bi bi-person-plus"></i> Nuevo Usuario
        </a>
    </div>

    <table class="table table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Usuario</th>
            <th>Rol</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${usuarios}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.username}"></td>
            <td>
                <span th:text="${u.rol}"
                      th:class="${u.rol == 'ROLE_ADMIN' ? 'badge bg-danger' : 'badge bg-secondary'}">
                </span>
            </td>
            <td>
                <a class="btn btn-danger btn-sm"
                   th:href="@{'/usuarios/eliminar/' + ${u.id}}">
                    <i class="bi bi-trash"></i> Eliminar
                </a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
