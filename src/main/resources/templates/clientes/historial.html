<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Historial Cliente')}"></head>

<body>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">

    <h2><i class="bi bi-clock-history"></i> Historial de <span th:text="${cliente.nombre}"></span></h2>

    <div class="card mb-3" style="max-width: 400px;">
        <div class="card-body">
            <p><strong><i class="bi bi-card-id"></i> Documento:</strong> <span th:text="${cliente.documento}"></span></p>
            <p><strong><i class="bi bi-telephone"></i> Teléfono:</strong> <span th:text="${cliente.telefono}"></span></p>
            <p><strong><i class="bi bi-envelope"></i> Email:</strong> <span th:text="${cliente.email}"></span></p>
        </div>
    </div>

    <table class="table table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Productos</th>
            <th>Total</th>
            <th>Fecha</th>
        </tr>
        </thead>
        <tbody>

        <tr th:if="${ventas == null || #lists.isEmpty(ventas)}">
            <td colspan="4" class="text-center">No hay compras registradas</td>
        </tr>

        <tr th:each="v : ${ventas}">
            <td th:text="${v.id}"></td>
            <td>
                <ul class="mb-0">
                    <li th:each="d : ${v.detalles}"
                        th:text="${d.producto.nombre + ' x' + d.cantidad + ' = $' + d.subtotal}">
                    </li>
                </ul>
            </td>
            <td th:text="${'$' + v.total}"></td>
            <td th:text="${v.fecha}"></td>
        </tr>

        </tbody>
    </table>

    <div class="card" style="max-width: 300px;">
        <div class="card-body">
            <h5>💰 Total general: <span th:text="${'$' + totalGeneral}"></span></h5>
        </div>
    </div>

    <div class="mt-3">
        <a href="/clientes" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Volver
        </a>
    </div>

</div>

</body>
</html>
