<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

<h2>Usuarios</h2>

<a class="btn btn-primary mb-3" th:href="@{/usuarios/nuevo}">Nuevo Usuario</a>
<a class="btn btn-secondary mb-3" th:href="@{/}">🏠 Menú principal</a>

<table class="table table-bordered table-hover">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Usuario</th>
        <th>Rol</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="u : ${usuarios}">
        <td th:text="${u.id}"></td>
        <td th:text="${u.username}"></td>
        <td th:text="${u.rol}"></td>
        <td>
            <a class="btn btn-danger btn-sm"
               th:href="@{'/usuarios/eliminar/' + ${u.id}}">
                Eliminar
            </a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
