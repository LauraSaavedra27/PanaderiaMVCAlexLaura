<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Categorías')}"></head>

<body>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">

    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

    <h2><i class="bi bi-tags-fill"></i> Categorías</h2>

    <div class="mb-3">
        <a class="btn btn-primary" th:href="@{/categorias/nuevo}">
            <i class="bi bi-plus-circle"></i> Nueva Categoría
        </a>
    </div>

    <table class="table table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${categorias}">
            <td th:text="${c.id}"></td>
            <td th:text="${c.nombre}"></td>
            <td th:text="${c.descripcion}"></td>
            <td>
                <a class="btn btn-warning btn-sm"
                   th:href="@{'/categorias/editar/' + ${c.id}}">
                    <i class="bi bi-pencil"></i> Editar
                </a>
                <a class="btn btn-danger btn-sm"
                   th:href="@{'/categorias/eliminar/' + ${c.id}}">
                    <i class="bi bi-trash"></i> Eliminar
                </a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
