<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Ventas')}"></head>

<body>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">

    <h2><i class="bi bi-cart-fill"></i> Ventas</h2>

    <div class="mb-3">
        <a href="/ventas/nuevo" class="btn btn-success">
            <i class="bi bi-cart-plus"></i> Nueva Venta
        </a>
    </div>

    <table class="table table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Cliente</th>
            <th>Productos</th>
            <th>Total</th>
            <th>Fecha</th>
            <th>Estado</th>
            <th>Cambiar Estado</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="v : ${ventas}">
            <td th:text="${v.id}"></td>
            <td th:text="${v.cliente != null ? v.cliente.nombre : 'N/A'}"></td>
            <td>
                <ul class="mb-0">
                    <li th:each="d : ${v.detalles}"
                        th:text="${d.producto.nombre + ' x' + d.cantidad + ' = $' + d.subtotal}">
                    </li>
                </ul>
            </td>
            <td th:text="${'$' + v.total}"></td>
            <td th:text="${v.fecha}"></td>
            <!-- ✅ Badge de color según estado -->
            <td>
                <span th:text="${v.estado}"
                      th:classappend="${v.estado != null and v.estado.name() == 'PENDIENTE'} ? 'badge bg-warning text-dark' :
                                      (${v.estado != null and v.estado.name() == 'PAGADO'} ? 'badge bg-success' :
                                      'badge bg-primary')">
                </span>
            </td>
            <!-- ✅ Formulario para cambiar estado directo desde la lista -->
            <td>
                <form th:action="@{'/ventas/' + ${v.id} + '/estado'}" method="post" class="d-flex gap-1">
                    <select name="estado" class="form-select form-select-sm" style="width:130px;">
                        <option value="PENDIENTE" th:selected="${v.estado != null and v.estado.name() == 'PENDIENTE'}">PENDIENTE</option>
                        <option value="PAGADO"    th:selected="${v.estado != null and v.estado.name() == 'PAGADO'}">PAGADO</option>
                        <option value="ENTREGADO" th:selected="${v.estado != null and v.estado.name() == 'ENTREGADO'}">ENTREGADO</option>
                    </select>
                    <button type="submit" class="btn btn-sm btn-outline-secondary">
                        <i class="bi bi-check"></i>
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
