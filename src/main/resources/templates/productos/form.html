<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Formulario Producto')}"></head>

<body>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">

    <h2><i class="bi bi-box-seam-fill"></i> Producto</h2>

    <div class="card" style="max-width: 600px;">
        <div class="card-body p-4">

            <form th:action="@{/productos/guardar}" th:object="${producto}" method="post">

                <input type="hidden" th:field="*{id}"/>

                <div class="mb-3">
                    <label><i class="bi bi-box"></i> Nombre</label>
                    <input type="text" class="form-control" th:field="*{nombre}" required>
                </div>

                <div class="mb-3">
                    <label><i class="bi bi-currency-dollar"></i> Precio</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{precio}" required>
                </div>

                <div class="mb-3">
                    <label><i class="bi bi-stack"></i> Stock</label>
                    <input type="number" class="form-control" th:field="*{stock}" required>
                </div>

                <div class="mb-3">
                    <label><i class="bi bi-tags"></i> Categoría</label>
                    <select class="form-control" th:field="*{categoria.id}">
                        <option th:each="c : ${categorias}"
                                th:value="${c.id}"
                                th:text="${c.nombre}">
                        </option>
                    </select>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-check-circle"></i> Guardar
                    </button>
                    <a th:href="@{/productos}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Volver
                    </a>
                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>
