<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <title th:text="${title}">Panadería</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilos.css">
</head>

<body>
<div th:fragment="sidebar">
    <div class="sidebar">
        <div class="sidebar-header">
            <h4>🥐 Hello Bread</h4>
            <small sec:authentication="name">usuario</small>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="sidebar-link">
                <i class="bi bi-house-fill"></i> Dashboard
            </a>
            <a href="/clientes" class="sidebar-link">
                <i class="bi bi-people-fill"></i> Clientes
            </a>
            <a href="/productos" class="sidebar-link">
                <i class="bi bi-box-seam-fill"></i> Productos
            </a>
            <a href="/categorias" class="sidebar-link">
                <i class="bi bi-tags-fill"></i> Categorías
            </a>
            <a href="/ventas" class="sidebar-link">
                <i class="bi bi-cart-fill"></i> Ventas
            </a>
            <a href="/usuarios" class="sidebar-link">
                <i class="bi bi-person-lock"></i> Usuarios
            </a>
        </nav>
        <div class="sidebar-footer">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn-logout">
                    <i class="bi bi-box-arrow-left"></i> Cerrar sesión
                </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
