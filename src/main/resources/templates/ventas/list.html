<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Ventas')}"></head>

<body>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">

    <h2><i class="bi bi-cart-fill"></i> Ventas</h2>

    <div class="mb-3">
        <a href="/ventas/nuevo" class="btn btn-success">
            <i class="bi bi-cart-plus"></i> Nueva Venta
        </a>
    </div>

    <table class="table table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Cliente</th>
            <th>Productos</th>
            <th>Total</th>
            <th>Fecha</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="v : ${ventas}">
            <td th:text="${v.id}"></td>
            <td th:text="${v.cliente != null ? v.cliente.nombre : 'N/A'}"></td>
            <td>
                <ul class="mb-0">
                    <li th:each="d : ${v.detalles}"
                        th:text="${d.producto.nombre + ' x' + d.cantidad + ' = $' + d.subtotal}">
                    </li>
                </ul>
            </td>
            <td th:text="${'$' + v.total}"></td>
            <td th:text="${v.fecha}"></td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
